<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:img" content="https://bit.ly/discord-cdn-png">
    <meta property="og:title" content="Dev-Joon's profile">
    <meta property="og:description" content="성장하는 Dev-Joon의 프로필입니다.">
    <link rel="stylesheet" href="./src/css/main.css">
    <title>Dev-Joon's profile</title>
</head>
<body>
    <div class="wrap">
        <div class="card_bg">
            <div class="profile">
                <div class="logo"></div>
            </div>
            <div class="title">
                <h1> Dev-Joon </h1>
                <p>성장하는 개발자 Joon 입니다.</p>  
            </div>  
            <div class="SNS_pannel">
                <div class="logos_wrapper">               
                    <a href="https://github.com/nocodle" class="sns_inner">
                        <img class="sns_logo" src="./src/github.png" alt="GitHub_logo"/>
                    </a>                                
                    <h4>GitHub</h4>
                </div>
                <div class="logos_wrapper">               
                    <a href="https://www.youtube.com/@%EB%85%B8%EC%BD%94%EB%B0%95%EC%82%AC_Official?sub_confirmation=1" class="sns_inner">
                        <img class="sns_logo" src="./src/youtube.png" alt="youtube_logo"/>
                    </a>                                
                    <h4>Youtube</h4>
                </div>                
                <div class="logos_wrapper">
                    <a href="" class="sns_inner">
                        <img class="sns_logo" src="./src/instagram.png" alt="instagram_logo"/>
                    </a>                
                    <h4>Instagram</h4>
                </div>
            </div>                        
        </div>
        <div class="list_bg">
            <div class="filter_bar">
                <button class="filter_btn active" data-category="포스팅">
                    <h3>포스팅</h3>
                </button>
                <button class="filter_btn" data-category="포트폴리오">
                    <h3>포트폴리오</h3>
                </button>
                <button class="filter_btn" data-category="제휴링크">
                    <h3>제휴링크</h3>
                </button>
            </div>
            <h3 id="listTitle"> 포스팅 </h3>
            <div class="list_nav_wrap">
                <button id="prevBtn" class="nav_btn">◀</button>
                <div class="list_container" id="listContainer"></div>
                <button id="nextBtn" class="nav_btn">▶</button>
            </div>            
        </div>
    </div>
    <script src="./src/js/main.js"></script>
    <!-- <script src="./src/js/security.js"></script>          -->
</body>
</html>
