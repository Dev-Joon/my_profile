<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="./src/css/main.css">
    <title>노코들 - 노래로 코딩하는 법을 들어봐요! profile </title>
</head>
<body>
    <div class="wrap">
        <div class="card_bg">
            <div class="profile">
                <div class="logo"></div>
            </div>
            <div class="title">
                <h1> 노래로 코딩하는 법을 들어봐요! </h1>  
            </div>  
            <div class="SNS_pannel">
                <div class="logos_wrapper">    
                    <a href="https://www.tiktok.com/@nocodle_official" class="sns_inner">
                        <img class="sns_logo" src="./src/tiktok.png" alt="tictok_logo"/>
                    </a>              
                    <h4>Tiktok</h4>
                </div>
                <div class="logos_wrapper">               
                    <a href="" class="sns_inner">
                        <img class="sns_logo" src="./src/youtube.png" alt="youtube_logo"/>
                    </a>                                
                    <h4>Youtube</h4>
                </div>
                <div class="logos_wrapper">
                    <a href="" class="sns_inner">
                        <img class="sns_logo" src="./src/instagram.png" alt="instagram_logo"/>
                    </a>                
                    <h4>Instagram</h4>
                </div>
            </div>                        
        </div>
        <div class="list_bg">
            <div class="filter_bar">
                <button class="filter_btn active" data-category="강의 목차">
                    <h3>강의 목차</h3>
                </button>
                <button class="filter_btn" data-category="포트폴리오">
                    <h3>포트폴리오</h3>
                </button>
                <button class="filter_btn" data-category="제휴링크">
                    <h3>제휴링크</h3>
                </button>
            </div>
            <h3 id="listTitle"> 강의 목차 </h3>
            <div class="list_nav_wrap">
                <button id="prevBtn" class="nav_btn">◀</button>
                <div class="list_container" id="listContainer"></div>
                <button id="nextBtn" class="nav_btn">▶</button>
            </div>
            
        </div>
    </div>
    <script src="./src/js/main.js"></script>
    <script src="./src/js/security.js"></script>
